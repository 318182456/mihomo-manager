name = "mihomo-manager"
main = "src/worker/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[build]
command = "npm run build"

# wrangler v4 自动 provisioning：首次 deploy 时自动创建 KV namespace 并写入 id
[[kv_namespaces]]
binding = "KV"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "mihomo-attachments"