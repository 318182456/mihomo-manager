proxy-groups:

  - name: 自动选择
    type: fallback
    proxies:
      - XS-优选
      - vps
    url: https://www.gstatic.com/generate_204
    interval: 300
    icon: https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

  - name: XS-优选
    type: url-test
    use: [XS]
    <<: *exclude
    tolerance: 50
    interval: 300
    icon: https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png

  - name: vps
    type: fallback
    use: [ak, wispbyte]
    <<: *exclude
    url: https://www.gstatic.com/generate_204
    interval: 300
    icon: https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png

  - name: 默认
    type: select
    proxies: [自动选择,直连,香港,台湾,日本,新加坡,美国,德国]
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"

  - name: 全部节点
    type: select
    include-all: true
    <<: *exclude
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"

  - name: AI
    type: url-test
    use:
      - XS
    filter: "(?i)(美|us|unitedstates|日|jp|japan|新|sg|singapore|狮城|台|tw|taiwan|马来|my|malaysia|德|de)"
    interval: 300
    icon: https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png

  - name: Google
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png"

  - name: Telegram
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png"

  - name: Twitter
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Twitter.png"

  - name: 哔哩哔哩
    <<: *pr-china
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/bilibili.png"

  - name: 巴哈姆特
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bahamut.png"

  - name: YouTube
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png"

  - name: NETFLIX
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix.png"

  - name: Spotify
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png"

  - name: Github
    <<: *pr
    icon: https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Github.png

  - name: 国内
    <<: *pr-china
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China_Map.png"

  - name: 其他
    <<: *pr
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"

  # 分地区分组
  - name: 香港
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)港|hk|hongkong"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/HK.png"

  - name: 台湾
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)台|tw|taiwan"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TW.png"

  - name: 日本
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日|jp|japan"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/JP.png"

  - name: 美国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美|us|unitedstates"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/US.png"

  - name: 新加坡
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(新|狮|sg|singapore)"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/SG.png"

  - name: 德国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(德|de|germany)"
    icon: "https://gh-proxy.com/raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DE.png"